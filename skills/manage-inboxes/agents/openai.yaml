interface:
  display_name: "Manage Inboxes"
  short_description: "Create and manage AgentMail inboxes"
  default_prompt: "Use $manage-inboxes to create, update, or delete AgentMail inboxes."
dependencies:
  tools:
    - type: "mcp"
      value: "agentmail"
      description: "AgentMail hosted MCP server"
      transport: "streamable_http"
      url: "https://mcp.agentmail.to/mcp"
policy:
  allow_implicit_invocation: true
