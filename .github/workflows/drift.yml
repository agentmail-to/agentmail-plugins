name: Check upstream drift

on:
  pull_request:
    paths:
      - compatibility.json
      - scripts/check_compatibility.py
      - .github/workflows/drift.yml
  push:
    branches: [main]
    paths:
      - compatibility.json
      - scripts/check_compatibility.py
      - .github/workflows/drift.yml
  schedule:
    - cron: "17 16 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check upstream compatibility
        run: python3 scripts/check_compatibility.py
